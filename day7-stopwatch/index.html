<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Day 7 - Stopwatch / Timer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="stopwatch-container">
    <h1>Stopwatch</h1>

    <!-- Time display, e.g. 00:00.00 -->
    <div id="time-display" class="time-display">00:00.00</div>

    <div class="controls">
      <button id="start-pause-btn" class="btn btn-start">Start</button>
      <button id="lap-btn" class="btn btn-lap" disabled>Lap</button>
      <button id="reset-btn" class="btn btn-reset">Reset</button>
    </div>

    <h2>Laps</h2>
    <ul id="laps-list" class="laps-list">
      <!-- Lap items will be rendered here -->
    </ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
