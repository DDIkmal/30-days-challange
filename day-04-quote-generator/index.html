<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day 4 - Quote Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <h1>Quote Generator</h1>

    <div id="quoteContainer" class="quote-card">
      <!-- display area for the quote text -->
      <p id="quoteText">Click the button for a new quote!</p>
      <!-- display area for the quote author -->
      <p id="quoteAuthor">- Author -</p>
    </div>

    <div class="actions">
      <!-- a "New Quote" button -->
      <button id="newQuote">New Quote</button>
      <!-- a "Copy to Clipboard" button -->
      <button id="copyQuote">Copy</button>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
